<div class="form-page">
  <div class="form-header">
    <h1>{{ isEditMode ? '✏️ Modifier l\'article' : '📝 Nouvel article' }}</h1>
  </div>

  <div class="form-container">
    <div class="form-group">
      <label>Titre *</label>
      <input type="text" [(ngModel)]="article.title" placeholder="Titre de l'article..." />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Catégorie *</label>
        <select [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
          <option value="">Choisir une catégorie</option>
          @for (cat of categories; track cat) {
            <option [value]="cat">{{ cat }}</option>
          }
          <option value="autre">➕ Autre (personnalisée)</option>
        </select>
        @if (selectedCategory === 'autre') {
          <input
            type="text"
            [(ngModel)]="customCategory"
            placeholder="Ex: Punk, Grunge, Noise..."
            style="margin-top: 0.5rem" />
        }
      </div>
      </div>

      <div class="form-group">
        <label>Auteur</label>
        <input type="text" [(ngModel)]="article.author" placeholder="Nom de l'auteur..." />
      </div>
    </div>

    <div class="form-group">
      <label>Résumé</label>
      <input type="text" [(ngModel)]="article.summary" placeholder="Résumé court de l'article..." />
    </div>

    <div class="form-group">
      <label>Image (URL)</label>
      <input type="text" [(ngModel)]="article.image" placeholder="https://..." />
      @if (article.image) {
        <img class="image-preview" [src]="article.image" alt="preview" />
      }
    </div>

    <div class="form-group">
      <label>Tags (séparés par des virgules)</label>
      <input type="text" [(ngModel)]="tagInput" placeholder="Heavy Metal, Classic, Review..." (blur)="addTag()" />
      <div class="tags-preview">
        @for (tag of article.tags; track tag) {
          <span class="tag"># {{ tag }}</span>
        }
      </div>
    </div>

    <div class="form-group">
      <label>Contenu *</label>
      <textarea [(ngModel)]="article.content" rows="12" placeholder="Contenu de l'article..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="cancel()">Annuler</button>
      <button class="btn-submit" (click)="onSubmit()">
        {{ isEditMode ? '💾 Sauvegarder' : '🚀 Publier' }}
      </button>
    </div>
  </div>
