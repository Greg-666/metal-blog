<div class="login-page">
  <video class="video-background" autoplay muted loop playsinline>
    <source src="faucheuse.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <div class="login-card">
    <div class="login-header">
      <h1>🤘 MetalBlog</h1>
      <p>{{ isLoginMode ? 'Connexion' : 'Demande d\'adhésion' }}</p>
    </div>

    @if (errorMessage) {
      <div class="alert error">{{ errorMessage }}</div>
    }

    @if (successMessage) {
      <div class="alert success">{{ successMessage }}</div>
    }

    <div class="login-form">
      @if (!isLoginMode) {
        <div class="form-group">
          <label>Pseudo</label>
          <input type="text" [(ngModel)]="username" placeholder="Ton pseudo metal..." />
        </div>
      }

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="email@metalblog.com" />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" />
      </div>

      <button class="btn-submit" (click)="onSubmit()">
        {{ isLoginMode ? 'Se connecter' : 'Envoyer la demande' }}
      </button>
    </div>

    <div class="login-footer">
      @if (isLoginMode) {
        <p>Pas encore membre ? <span class="toggle-link" (click)="toggleMode()">Demander l'accès</span></p>
      } @else {
        <p>Déjà membre ? <span class="toggle-link" (click)="toggleMode()">Se connecter</span></p>
      }
    </div>
  </div>
</div>
